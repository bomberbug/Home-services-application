<!DOCTYPE html>
<html lang="en">
<head>

    <title>Create Service</title>
    <style>
        body {
            padding: 120px;
            font-family: Arial, sans-serif;
            margin: auto;
            background-color: gray;
        }
        .container {
            max-width: 400px;
            margin: auto;
            padding:50px;
            background: lightgray;
            border-radius: 5px;
            box-shadow: 50px 50px 50px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        label {
            display: block;
            margin: 5px 5px 5px;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            border-radius:10px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Create Service</h1>
    <form method="POST">

        <label for="service">Type of Service Needed:</label>
        <input type="text" id="service" name="service" required>

        <label for="charges">charges:</label>
        <input type="number" id="charges" name="charges" required>

        <button type="submit">Submit</button>
    </form>
</div>

</body>
</html>

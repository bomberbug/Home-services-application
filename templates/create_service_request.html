<!DOCTYPE html>
<html lang="en">
<head>
    <title>Create Service Request</title>
    <style>
        body {
            padding: 120px;
            font-family: Arial, sans-serif;
            margin: auto;
            background-color: gray;
        }
        .container {
            max-width: 400px;
            margin: auto;
            padding: 50px;
            background: lightgray;
            border-radius: 5px;
            box-shadow: 50px 50px 50px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        label {
            display: block;
            margin: 5px 5px 5px;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Create Service Request</h1>
    <form method="POST" action="{{ url_for('create_service_request',service=service,username=username) }}">
       
       <input type="hidden" id="username" name="username" value="{{ username }}" readonly required>
       
       <input type="hidden" id="service" name="service" value="{{ service }}" readonly required>
       
       <label for="pincode">Location Pincode:</label>
       <input type="number" id="pincode" name="pincode" required>

       <label for="date">Date:</label>
       <input type="date" id="date" name="date" required>

       <button type="submit">Submit</button>
    </form>
</div>
</body>
</html>
